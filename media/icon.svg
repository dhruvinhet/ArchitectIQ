    <stop offset="0%"   stop-color="#0a0830"/>
    <stop offset="100%" stop-color="#060519"/>
  </radialGradient>

  <radialGradient id="cg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#c89eff" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#7040e0" stop-opacity="0"/>
